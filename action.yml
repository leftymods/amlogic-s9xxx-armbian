name: "Rebuild CoreOS and Kernel"
author: "https://github.com/leftymods/amlogic-s9xxx-armbian"
description: "Support Amlogic boxes."
inputs:
  # Select build target
  build_target:
    description: "Select build target: coreos / kernel"
    required: false
    default: "coreos"
  # For build coreos -----
  coreos_path:
    description: "Set CoreOS file path."
    required: false
    default: "build/output/images/*.img"
  coreos_board:
    description: "Set device Board."
    required: false
    default: "all"
  kernel_repo:
    description: "Set kernel repository."
    required: false
    default: "ophub/kernel"
  kernel_usage:
    description: "Set the tags of the stable kernel."
    required: false
    default: "stable"
  coreos_kernel:
    description: "Set kernel version."
    required: false
    default: "6.1.y_6.12.y"
  auto_kernel:
    description: "Auto use the latest kernel."
    required: false
    default: "true"
  coreos_fstype:
    description: "Set coreos rootfs type: ext4 / btrfs"
    required: false
    default: "ext4"
  coreos_size:
    description: "Set coreos rootfs size(Unit: MiB)."
    required: false
    default: ""
  coreos_files:
    description: "Add custom CoreOS files."
    required: false
    default: ""
  builder_name:
    description: "Set CoreOS builder signature."
    required: false
    default: ""
  # For compile kernel -----
  kernel_source:
    description: "Select the kernel source code"
    required: false
    default: "unifreq"
  kernel_version:
    description: "Select kernel version"
    required: false
    default: "6.1.y_6.12.y"
  kernel_auto:
    description: "Auto use the latest kernel"
    required: false
    default: "true"
  kernel_package:
    description: "Select compile package list"
    required: false
    default: "all"
  kernel_sign:
    description: "Set the kernel custom signature (default: -atr)"
    required: false
    default: "-atr"
  kernel_toolchain:
    description: "Select the compilation toolchain"
    required: false
    default: "clang"
  config_flavor:
    description: "Set the kernel config flavor"
    required: false
    default: ""
  kernel_config:
    description: "Set the path of kernel .config"
    required: false
    default: "false"
  kernel_patch:
    description: "Set the directory for kernel patches"
    required: false
    default: "false"
  auto_patch:
    description: "Set whether to use kernel patches"
    required: false
    default: "false"
  compress_format:
    description: "Set the initrd compression format"
    required: false
    default: "xz"
  delete_source:
    description: "Set whether to delete the kernel source"
    required: false
    default: "false"
  silent_log:
    description: "Set whether to use silent log output"
    required: false
    default: "false"
  enable_log:
    description: "Set whether to output logs to a file"
    required: false
    default: "false"
  ccache_clear:
    description: "Set whether to clear the cache"
    required: false
    default: "false"
  docker_hostpath:
    description: "Set Docker working directory"
    required: false
    default: ""
  docker_image:
    description: "Select CoreOS docker image"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - shell: bash
      run: |
        cd ${{ github.action_path }}
        echo -e "Current running path: [ ${PWD} ]"
        build_target="${{ inputs.build_target }}"
        [[ -z "${build_target}" ]] && build_target="coreos"

        if [[ "${build_target}" == "coreos" ]]; then

            cd ${{ github.action_path }}
            echo -e "Starting CoreOS rebuild..."

            coreos_file="${{ inputs.coreos_path }}"
            coreos_filename="${coreos_file##*/}"
            coreos_filepath="build/output/images"
            echo -e "CoreOS file input parameters: [ ${coreos_file} ]"
            [[ -z "${coreos_file}" ]] && echo -e "The [ coreos_path ] variable must be specified." && exit 1
            [[ -d "${coreos_filepath}" ]] || mkdir -p ${coreos_filepath}
            if [[ "${coreos_file}" =~ ^http ]]; then
                echo -e "Downloading file: [ ${coreos_file} ]"
                curl -fsSL "${coreos_file}" -o "${coreos_filepath}/${coreos_filename}"
            else
                if [[ -z "$(ls ${coreos_filepath}/${coreos_filename} 2>/dev/null)" ]]; then
                    echo -e "Copying files: [ ${coreos_file} ]"
                    if [[ "${coreos_file}" =~ ^/ ]]; then
                        cp -vf ${coreos_file} -t ${coreos_filepath}/ || true
                    else
                        cp -vf ${{ github.workspace }}/${coreos_file} -t ${coreos_filepath}/ || true
                    fi
                else
                    echo -e "File [ ${coreos_filepath}/${coreos_filename} ] already exists, skipping."
                fi
            fi
            sync
            echo -e "Contents of [ ${coreos_filepath} ] directory: \n$(ls -lh ${coreos_filepath} 2>/dev/null)"

            cd ${coreos_filepath}
            echo -e "Checking the CoreOS file format..."
            down_file="$(ls -l *.img* 2>/dev/null | grep "^-" | awk '{print $9}' | sort -u | head -n 1)"
            if [[ -n "${down_file}" ]]; then
                echo -e "Selected CoreOS file: [ ${down_file} ]"
            else
                echo -e "The CoreOS file is invalid!"
                exit 1
            fi
            # Decompress the CoreOS image file. Use -k to keep the original
            # compressed file so its sha256sum is preserved for upload dedup.
            case "${down_file}" in
                *.img.gz) gzip -dkf "${down_file}" 2>/dev/null && sync ;;
                *.img.xz) xz -dk "${down_file}" 2>/dev/null && sync ;;
                *.zip)    unzip -o "${down_file}" 2>/dev/null && sync ;;
            esac
            echo -e "CoreOS file: \n$(ls -lh *.img 2>/dev/null)"

            echo -e "Checking the CoreOS filename (-trunk_)..."
            image_file="$(ls *.img 2>/dev/null | head -n 1)"
            if [[ "${image_file}" =~ "-trunk_" ]]; then
                echo -e "The CoreOS filename is correct."
            else
                echo -e "Modifying CoreOS filename..."
                # Get image version, such as 25.11.0
                image_version="$(echo ${image_file} | grep -oE '[0-9]{2}\.[0-9]{1,2}\.[0-9]{1,2}' | head -n 1)"
                # Get image kernel version, such as 6.12.56
                image_kernel="$(echo ${image_file} | grep -oE '[0-9]+\.[0-9]{1,2}\.[0-9]{1,3}' | grep -vxF "${image_version}" | head -n 1)"
                # Get image codename, such as trixie
                image_codename="$(echo ${image_file} | grep -oE "(trixie|bookworm|bullseye|resolute|noble|jammy)" || echo '')"
                # Rename coreos image file
                image_save_name="CoreOS_${image_version}-trunk_${image_codename}_arm64_${image_kernel}.img"
                rm -f ${image_save_name}
                mv -f ${image_file} ${image_save_name}
                echo -e "Renamed CoreOS file: [ ${image_save_name} ]"
            fi

            # Custom CoreOS rebuild files
            if [[ -n "${{ inputs.coreos_files }}" && "${{ inputs.coreos_files }}" != "false" ]]; then
                echo -e "Adding custom CoreOS rebuild files..."
                copy_from_path="${{ inputs.coreos_files }}"
                copy_from_path="${copy_from_path%/}"
                [[ "${copy_from_path}" != /* ]] && copy_from_path="${{ github.workspace }}/${copy_from_path}"
                copy_to_path="build-coreos/coreos-files/common-files"
                cp -avf --no-preserve=ownership "${copy_from_path}/." -t "${copy_to_path}/" || true
            else
                echo -e "Using the default CoreOS rebuild files."
            fi

            # Set builder custom signature
            [[ -n "${{ inputs.builder_name }}" ]] && {
                builder_name="${{ inputs.builder_name }}"
                builder_name="${builder_name// /-}"
            }

            cd ${{ github.action_path }}
            echo -e "Starting to rebuild CoreOS..."
            make_args=()
            [[ -n "${{ inputs.coreos_board }}"   ]] && make_args+=(-b "${{ inputs.coreos_board }}")
            [[ -n "${{ inputs.kernel_repo }}"     ]] && make_args+=(-r "${{ inputs.kernel_repo }}")
            [[ -n "${{ inputs.kernel_usage }}"    ]] && make_args+=(-u "${{ inputs.kernel_usage }}")
            [[ -n "${{ inputs.coreos_kernel }}"  ]] && make_args+=(-k "${{ inputs.coreos_kernel }}")
            [[ -n "${{ inputs.auto_kernel }}"     ]] && make_args+=(-a "${{ inputs.auto_kernel }}")
            [[ -n "${{ inputs.coreos_fstype }}"  ]] && make_args+=(-t "${{ inputs.coreos_fstype }}")
            [[ -n "${{ inputs.coreos_size }}"    ]] && make_args+=(-s "${{ inputs.coreos_size }}")
            [[ -n "${builder_name}"               ]] && make_args+=(-n "${builder_name}")
            sudo ./rebuild "${make_args[@]}"

            cd ${{ github.action_path }}/${coreos_filepath}
            # Remove the decompressed input .img to free up space; the original .img.gz is kept.
            rm -f *-trunk_*.img
            # Compress any remaining .img files (e.g. user-supplied extras). Guard against an
            # empty glob and prefer pigz when present, otherwise fall back to gzip.
            shopt -s nullglob
            imgs=( *.img )
            shopt -u nullglob
            if [[ "${#imgs[@]}" -gt 0 ]]; then
                if command -v pigz >/dev/null 2>&1; then
                    pigz -qf "${imgs[@]}"
                else
                    gzip -qf "${imgs[@]}"
                fi
            fi
            if [[ -z "$(ls *.img.gz 2>/dev/null)" ]]; then
                echo "error: No .img.gz file produced in [ ${PWD} ], aborting."
                echo "PACKAGED_STATUS=failure" >> ${GITHUB_ENV}
                exit 1
            fi
            sync && sleep 3

            cd ${{ github.action_path }}
            echo -e "Output environment variables."
            echo "PACKAGED_OUTPUTPATH=${PWD}/${coreos_filepath}" >> ${GITHUB_ENV}
            echo "PACKAGED_OUTPUTDATE=$(date +"%m.%d.%H%M")" >> ${GITHUB_ENV}
            echo "PACKAGED_STATUS=success" >> ${GITHUB_ENV}
            echo -e "PACKAGED_OUTPUTPATH: ${PWD}/${coreos_filepath}"
            echo -e "PACKAGED_OUTPUTDATE: $(date +"%m.%d.%H%M")"
            echo -e "PACKAGED_STATUS: success"
            echo -e "PACKAGED_OUTPUTPATH files list: \n$(ls -lh ${PWD}/${coreos_filepath}/ 2>/dev/null)"

        elif [[ "${build_target}" == "kernel" ]]; then

            cd ${{ github.action_path }}
            echo -e "Starting kernel compilation..."

            # Custom kernel config files
            config_filepath="compile-kernel/tools/config"
            [[ -d "${config_filepath}" ]] || mkdir -p ${config_filepath}
            if [[ -n "${{ inputs.kernel_config }}" && "${{ inputs.kernel_config }}" != "false" ]]; then
                if [[ "$(ls ${{ github.workspace }}/${{ inputs.kernel_config }}/config-* -l 2>/dev/null | grep "^-" | wc -l)" -ne "0" ]]; then
                    echo -e "Using a custom kernel compilation template..."
                    rm -f ${config_filepath}/* 2>/dev/null && sync
                    cp -vrf "${{ github.workspace }}/${{ inputs.kernel_config }}/." -t "${config_filepath}/" || true
                    echo -e "List of Kernel Custom Compilation Configuration Templates: \n$(ls -lh ${config_filepath} 2>/dev/null)"
                else
                    echo -e "The custom kernel compilation template path is invalid. Using the default template."
                fi
            else
                echo -e "Using the default kernel compilation template."
            fi

            # Custom kernel patch files
            custom_kernel_patch="compile-kernel/tools/patch"
            [[ -d "${custom_kernel_patch}" ]] || mkdir -p ${custom_kernel_patch}
            if [[ -n "${{ inputs.kernel_patch }}" && "${{ inputs.kernel_patch }}" != "false" ]]; then
                if [[ -d "${{ github.workspace }}/${{ inputs.kernel_patch }}" ]]; then
                    echo -e "Using custom kernel patches..."
                    rm -rf ${custom_kernel_patch}/* 2>/dev/null && sync
                    cp -vrf "${{ github.workspace }}/${{ inputs.kernel_patch }}/." -t "${custom_kernel_patch}/" || true
                    echo -e "Directory of custom kernel patches: \n$(ls -lh ${custom_kernel_patch} 2>/dev/null)"
                else
                    echo -e "Invalid custom kernel patch directory. Skipping."
                fi
            else
                echo -e "No custom kernel patches provided."
            fi

            # Set kernel custom signature
            [[ -n "${{ inputs.kernel_sign }}" ]] && {
                kernel_sign="${{ inputs.kernel_sign }}"
                kernel_sign="${kernel_sign// /-}"
            }

            echo -e "Building kernel compilation command."
            make_args=()
            [[ -n "${{ inputs.kernel_source }}"    ]] && make_args+=(-r "${{ inputs.kernel_source }}")
            [[ -n "${{ inputs.kernel_version }}"   ]] && make_args+=(-k "${{ inputs.kernel_version }}")
            [[ -n "${{ inputs.kernel_auto }}"      ]] && make_args+=(-a "${{ inputs.kernel_auto }}")
            [[ -n "${{ inputs.kernel_package }}"   ]] && make_args+=(-m "${{ inputs.kernel_package }}")
            [[ -n "${{ inputs.auto_patch }}"       ]] && make_args+=(-p "${{ inputs.auto_patch }}")
            [[ -n "${{ inputs.kernel_toolchain }}" ]] && make_args+=(-t "${{ inputs.kernel_toolchain }}")
            [[ -n "${{ inputs.compress_format }}"  ]] && make_args+=(-z "${{ inputs.compress_format }}")
            [[ -n "${{ inputs.delete_source }}"    ]] && make_args+=(-d "${{ inputs.delete_source }}")
            [[ -n "${{ inputs.silent_log }}"       ]] && make_args+=(-s "${{ inputs.silent_log }}")
            [[ -n "${{ inputs.ccache_clear }}"     ]] && make_args+=(-c "${{ inputs.ccache_clear }}")
            [[ -n "${{ inputs.config_flavor }}"    ]] && make_args+=(-f "${{ inputs.config_flavor }}")
            [[ -n "${{ inputs.enable_log }}"       ]] && make_args+=(-l "${{ inputs.enable_log }}")
            [[ -n "${{ inputs.docker_hostpath }}"  ]] && make_args+=(-h "${{ inputs.docker_hostpath }}")
            [[ -n "${{ inputs.docker_image }}"     ]] && make_args+=(-i "${{ inputs.docker_image }}")
            [[ -n "${kernel_sign}"                 ]] && make_args+=(-n "${kernel_sign}")
            sudo ./recompile "${make_args[@]}"

            cd ${{ inputs.docker_hostpath || github.action_path }}
            kernel_outpath="compile-kernel/output"
            output_tags="$(ls -l ${kernel_outpath}/*.tar.gz 2>/dev/null | awk '{print $9}' | grep -oP '\d+\.\d+\.\d+' | sort -u | xargs | tr "[ ]" "_")"
            echo -e "Setting output environment variables."
            echo "PACKAGED_OUTPUTTAGS=${output_tags}" >> ${GITHUB_ENV}
            echo "PACKAGED_OUTPUTPATH=${PWD}/${kernel_outpath}" >> ${GITHUB_ENV}
            echo "PACKAGED_OUTPUTDATE=$(date +"%m.%d.%H%M")" >> ${GITHUB_ENV}
            echo "PACKAGED_STATUS=success" >> ${GITHUB_ENV}
            echo -e "PACKAGED_OUTPUTTAGS: ${output_tags}"
            echo -e "PACKAGED_OUTPUTPATH: ${PWD}/${kernel_outpath}"
            echo -e "PACKAGED_OUTPUTDATE: $(date +"%m.%d.%H%M")"
            echo -e "PACKAGED_STATUS: success"
            echo -e "PACKAGED_OUTPUTPATH files list: \n$(ls -lh ${PWD}/${kernel_outpath}/ 2>/dev/null)"

        else
            echo -e "Please select a build target: coreos / kernel"
            exit 1
        fi

branding:
  icon: "terminal"
  color: "gray-dark"
