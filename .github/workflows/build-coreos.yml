#==========================================================================
# Build CoreOS: full pipeline from source to release
# Stages: setup → build → package → upload
# Author: leftymods
#==========================================================================

name: Build CoreOS

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      release:
        description: "OS release"
        required: false
        default: "trixie"
        type: choice
        options:
          - trixie
          - bookworm
          - resolute
          - noble
      kernel_version:
        description: "Kernel version"
        required: false
        default: "6.12.y"
        type: choice
        options:
          - 6.1.y
          - 6.6.y
          - 6.12.y
          - 6.18.y
      kernel_toolchain:
        description: "Compiler toolchain"
        required: false
        default: "gcc"
        type: choice
        options:
          - gcc
          - clang
      config_board:
        description: "Base board for compile.sh"
        required: false
        default: "odroidn2"
      custom_kernel_config:
        description: "Path to custom kernel .config directory"
        required: false
        default: "false"

env:
  TZ: Etc/UTC

jobs:
  #===========================================================================
  # Stage 1: Setup — map release names, set up build host
  #===========================================================================
  setup:
    runs-on: ubuntu-24.04
    outputs:
      release: ${{ steps.map.outputs.release }}
      codename: ${{ steps.map.outputs.codename }}
      build_tag: ${{ steps.map.outputs.build_tag }}
    steps:
      - name: Map release to codename and build tag
        id: map
        run: |
          RELEASE="${{ inputs.release }}"
          case "${RELEASE}" in
            trixie)   CODENAME="Nebula"   ;;
            bookworm) CODENAME="Bookworm" ;;
            resolute) CODENAME="Resolute" ;;
            noble)    CODENAME="Noble"    ;;
            *)        CODENAME="${RELEASE}" ;;
          esac
          echo "release=${RELEASE}"    >> "${GITHUB_OUTPUT}"
          echo "codename=${CODENAME}"  >> "${GITHUB_OUTPUT}"
          echo "build_tag=CoreOS_${CODENAME}_arm64_$(date +'%Y.%m')" >> "${GITHUB_OUTPUT}"

  #===========================================================================
  # Stage 2: Build — compile kernel, u-boot, rootfs, and OS image
  #===========================================================================
  build:
    needs: setup
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}

    name: coreos-${{ needs.setup.outputs.codename }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # ------------------------------------------------------------------
      # Step 2a: Initialize the GitHub Actions runner
      # ------------------------------------------------------------------
      - name: Initialize build environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-build-armbian-depends)
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo -E timedatectl set-timezone "${TZ:-Etc/UTC}"
          sudo -E ntpdate ntp.ubuntu.com 0.pool.ntp.org || true
          sudo -E timedatectl set-ntp true
          date -u
          echo "status=success" >> ${GITHUB_OUTPUT}

      # ------------------------------------------------------------------
      # Step 2b: Create LVM-backed virtual disk for build space
      # ------------------------------------------------------------------
      - name: Create virtual disk for extended storage
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder
          df -Th
          echo "status=success" >> ${GITHUB_OUTPUT}

      # ------------------------------------------------------------------
      # Step 2c: Clone the upstream Armbian build system
      # ------------------------------------------------------------------
      - name: Clone upstream build system
        id: clone
        working-directory: /builder
        run: |
          git clone -q --single-branch --depth=1 --branch=main \
            https://github.com/armbian/build.git build
          ln -sf /builder/build ${{ github.workspace }}/build
          echo "status=success" >> ${GITHUB_OUTPUT}

      # ------------------------------------------------------------------
      # Step 2d: Rebrand upstream build output to CoreOS
      # ------------------------------------------------------------------
      - name: Patch branding to CoreOS
        working-directory: /builder/build
        run: |
          # 1. Replace Armbian -> CoreOS in ALL text files across the entire tree
          find . -type f \( -name "*.sh" -o -name "*.conf" -o -name "*.config" \
            -o -name "*.json" -o -name "*.php" -o -name "*.php" -o -name "*.xml" \
            -o -name "*.txt" -o -name "*.md" -o -name "*.html" -o -name "*.c" \
            -o -name "*.h" -o -name "*.inc" -o -name "*.module" -o -name "*.install" \
            -o -name "*.theme" -o -name "*.css" -o -name "*.js" -o -name "*.py" \) \
            2>/dev/null | while read f; do
            sed -i 's/Armbian/CoreOS/g; s/armbian/coreos/g; s/ARMBIAN/COREOS/g' "$f" 2>/dev/null || true
          done
          # 2. Replace armbian- commands with coreos- in all files
          find . -type f 2>/dev/null | while read f; do
            sed -i 's/armbian-/coreos-/g' "$f" 2>/dev/null || true
          done
          # 3. Fix package names and maintainer in DEBIAN control files
          find . -name "control" -path "*/DEBIAN/*" 2>/dev/null | while read f; do
            sed -i 's/Maintainer:.*/Maintainer: leftymods <ggalab33@gmail.com>/' "$f" 2>/dev/null || true
            sed -i 's/Package: armbian-/Package: coreos-/g' "$f" 2>/dev/null || true
          done
          # 4. Fix initramfs hooks and scripts that print "Armbian:" banner
          find . -type f \( -path "*/initramfs*" -o -path "*/initrd*" \) \
            2>/dev/null | while read f; do
            sed -i 's/Armbian:/CoreOS:/g; s/armbian:/coreos:/g' "$f" 2>/dev/null || true
          done
          # 5. Fix armbianEnv.txt -> coreosEnv.txt references
          find . -type f 2>/dev/null | while read f; do
            sed -i 's/armbianEnv\.txt/coreosEnv.txt/g' "$f" 2>/dev/null || true
            sed -i 's/armbian_first_run/coreos_first_run/g' "$f" 2>/dev/null || true
          done
          # 6. Rename files and symlinks containing "armbian"
          find . -name "*armbian*" 2>/dev/null | while read f; do
            newname="$(echo "$f" | sed 's/armbian/coreos/g; s/Armbian/CoreOS/g')"
            [[ "$f" != "$newname" ]] && mv -f "$f" "$newname" 2>/dev/null || true
          done
          echo "Branding fully patched to CoreOS by leftymods"

      # ------------------------------------------------------------------
      # Step 2e: Inject custom kernel config if provided
      # ------------------------------------------------------------------
      - name: Apply custom kernel config
        if: ${{ inputs.custom_kernel_config != 'false' }}
        run: |
          config_src="${{ github.workspace }}/${{ inputs.custom_kernel_config }}"
          config_dst="/builder/build/config/kernel"
          if [[ -d "${config_src}" ]]; then
            cp -vf "${config_src}"/config-* "${config_dst}/" 2>/dev/null || true
            echo "Custom kernel config applied from: ${config_src}"
          fi

      # ------------------------------------------------------------------
      # Step 2f: Enable QEMU user-mode emulation for ARM chroots
      # ------------------------------------------------------------------
      - name: Enable QEMU for cross-compilation
        run: |
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes 2>/dev/null || true

      # ------------------------------------------------------------------
      # Step 2g: Compile everything — kernel, u-boot, rootfs, BSP, image
      # ------------------------------------------------------------------
      - name: Compile CoreOS [ ${{ needs.setup.outputs.codename }}, ${{ inputs.config_board }} ]
        id: compile
        working-directory: /builder/build
        run: |
          config_board="${{ inputs.config_board }}"
          [[ -z "${config_board}" ]] && config_board="odroidn2"

          ./compile.sh \
            RELEASE=${{ needs.setup.outputs.release }} \
            BOARD=${config_board} \
            BRANCH=current \
            BUILD_MINIMAL=no \
            BUILD_ONLY=default \
            HOST=coreos \
            BUILD_DESKTOP=no \
            EXPERT=yes \
            KERNEL_CONFIGURE=no \
            COMPRESS_OUTPUTIMAGE="sha" \
            SHARE_LOG=yes \
            KERNEL_VERSION=${{ inputs.kernel_version }} \
            TOOLCHAIN=${{ inputs.kernel_toolchain }}

          echo "status=success" >> ${GITHUB_OUTPUT}

      # ------------------------------------------------------------------
      # Step 2h: Collect deb packages from build output
      # ------------------------------------------------------------------
      - name: Collect deb packages
        id: collect
        run: |
          mkdir -p /builder/debs/coreos

          if [[ -d "/builder/build/output/debs" ]]; then
            find "/builder/build/output/debs" -name "*.deb" -exec cp -v {} /builder/debs/coreos/ \;
          fi
          if [[ -d "/builder/build/output/images" ]]; then
            find "/builder/build/output/images" -name "*.deb" -exec cp -v {} /builder/debs/coreos/ \; 2>/dev/null || true
          fi

          echo "Collected debs:"
          ls -lh /builder/debs/coreos/ 2>/dev/null || echo "No debs found"

          cd /builder/debs
          tar -czf coreos-all-debs.tar.gz coreos 2>/dev/null || true
          ls -lh /builder/debs/

          echo "status=success" >> ${GITHUB_OUTPUT}

      # ------------------------------------------------------------------
      # Step 2i: Upload compiled OS image to GitHub Releases
      # ------------------------------------------------------------------
      - name: Upload CoreOS image to Release
        uses: ophub/upload-to-releases@main
        if: ${{ steps.compile.outputs.status == 'success' && !cancelled() }}
        with:
          tag: ${{ needs.setup.outputs.build_tag }}
          artifacts: |
            /builder/build/output/images/*
          allow_updates: true
          remove_artifacts: false
          replaces_artifacts: true
          make_latest: true
          gh_token: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # Step 2j: Upload deb packages to the same Release
      # ------------------------------------------------------------------
      - name: Upload CoreOS deb packages to Release
        uses: ophub/upload-to-releases@main
        if: ${{ steps.collect.outputs.status == 'success' && !cancelled() }}
        with:
          tag: ${{ needs.setup.outputs.build_tag }}
          artifacts: /builder/debs/*
          allow_updates: true
          remove_artifacts: false
          replaces_artifacts: true
          make_latest: false
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ### CoreOS Image Information
            - Developer: leftymods
            - Default username: `root`
            - Default password: `1234`
            - Install command: `coreos-install`
            - Update command: `coreos-update`
            ### Included Debian Packages
            - linux-image-* — Kernel image and modules
            - linux-dtb-* — Device tree blobs
            - linux-headers-* — Kernel headers
            - linux-u-boot-* — U-Boot bootloader
            - coreos-bsp-cli-* — Board support package
            ### Applicable Platform
            - 🐧 `arm64`
