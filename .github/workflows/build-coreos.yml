#==========================================================================
# Description: Build CoreOS full OS image with kernel, u-boot, BSP debs
# Author: leftymods
#==========================================================================

name: Build CoreOS

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      set_release:
        description: "Select CoreOS Release"
        required: false
        default: "trixie"
        type: choice
        options:
          - trixie
          - bookworm
          - resolute
          - noble
      config_board:
        description: "Set the base board name"
        required: false
        default: "odroidn2"

      # Kernel: compile or use pre-built
      kernel_from_releases:
        description: "Use pre-built kernel from Releases"
        required: false
        default: false
        type: boolean
      kernel_release_tag:
        description: "Kernel Release tag (required if ☑ above, e.g. kernel_stable)"
        required: false
        default: ""
      kernel_version:
        description: "Kernel version (used when compiling)"
        required: false
        default: "6.12.y"
        type: choice
        options:
          - 6.1.y
          - 6.6.y
          - 6.12.y
          - 6.18.y
      kernel_toolchain:
        description: "Kernel toolchain (used when compiling)"
        required: false
        default: "gcc"
        type: choice
        options:
          - gcc
          - clang

      # Rootfs: build or use pre-built
      rootfs_from_releases:
        description: "Use pre-built rootfs from Releases"
        required: false
        default: false
        type: boolean
      rootfs_release_tag:
        description: "Rootfs Release tag (required if ☑ above, e.g. CoreOS_Nebula_2025.03)"
        required: false
        default: ""

env:
  TZ: Etc/UTC

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      release: ${{ steps.codename.outputs.release }}
      codename: ${{ steps.codename.outputs.codename }}
    steps:
      - name: Map release to codename
        id: codename
        run: |
          RELEASE="${{ inputs.set_release }}"
          case "${RELEASE}" in
            trixie)   CODENAME="Nebula" ;;
            bookworm) CODENAME="Bookworm" ;;
            resolute) CODENAME="Resolute" ;;
            noble)    CODENAME="Noble" ;;
            *)        CODENAME="${RELEASE}" ;;
          esac
          echo "codename=${CODENAME}" >> "${GITHUB_OUTPUT}"
          echo "release=${RELEASE}" >> "${GITHUB_OUTPUT}"

  build:
    needs: setup
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}

    name: coreos-${{ needs.setup.outputs.codename }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize build environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-build-armbian-depends)
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo -E timedatectl set-timezone "${TZ:-Etc/UTC}"
          sudo -E ntpdate ntp.ubuntu.com 0.pool.ntp.org || true
          sudo -E timedatectl set-ntp true
          date -u
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create virtual disk for extended storage
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder
          df -Th
          echo "status=success" >> ${GITHUB_OUTPUT}

      # ============================================================
      # Download pre-built kernel from Releases if requested
      # ============================================================
      - name: Download kernel from Releases
        id: kernel_dl
        if: ${{ inputs.kernel_from_releases == 'true' && inputs.kernel_release_tag != '' }}
        working-directory: /builder
        run: |
          TAG="${{ inputs.kernel_release_tag }}"
          echo "Downloading kernel from release tag: ${TAG}"

          # Query the release by tag
          release_data=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")

          # Download all kernel packages
          mkdir -p /builder/kernel_dl
          echo "${release_data}" | jq -r '.assets[]?.name' | while read name; do
            url=$(echo "${release_data}" | jq -r --arg n "$name" '.assets[] | select(.name == $n) | .url')
            echo "Downloading: ${name}"
            curl -fsSL \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/octet-stream" \
              "${url}" \
              -o "/builder/kernel_dl/${name}"
          done

          ls -lh /builder/kernel_dl/
          echo "status=success" >> ${GITHUB_OUTPUT}

      # ============================================================
      # Clone build system only if building from source
      # ============================================================
      - name: Clone build system
        id: clone
        if: ${{ inputs.rootfs_from_releases != 'true' }}
        working-directory: /builder
        run: |
          git clone -q --single-branch --depth=1 --branch=main https://github.com/armbian/build.git build
          ln -sf /builder/build ${{ github.workspace }}/build
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Patch branding to CoreOS
        if: ${{ inputs.rootfs_from_releases != 'true' }}
        working-directory: /builder/build
        run: |
          grep -rl "Armbian" lib/ config/ extensions/ tools/ --include="*.sh" --include="*.conf" --include="*.config" \
            --include="*.json" --include="*.php" 2>/dev/null | while read f; do
            sed -i 's/Armbian/CoreOS/g; s/armbian/coreos/g; s/ARMBIAN/COREOS/g' "$f" 2>/dev/null || true
          done
          grep -rl "armbian" config/ --include="*.conf" --include="*.sh" 2>/dev/null | while read f; do
            sed -i 's/armbian/coreos/g; s/Armbian/CoreOS/g' "$f" 2>/dev/null || true
          done
          find . -name "control" -path "*/DEBIAN/*" | while read f; do
            sed -i 's/Maintainer:.*/Maintainer: leftymods <ggalab33@gmail.com>/' "$f" 2>/dev/null || true
          done
          find . -name "*.sh" | while read f; do
            sed -i 's/armbian-/coreos-/g' "$f" 2>/dev/null || true
          done
          find . -name "control" | while read f; do
            sed -i 's/Package: armbian-/Package: coreos-/g' "$f" 2>/dev/null || true
          done
          echo "Branding patched to CoreOS by leftymods"

      # ============================================================
      # Download pre-built rootfs image from Releases if requested
      # ============================================================
      - name: Download rootfs from Releases
        id: rootfs_dl
        if: ${{ inputs.rootfs_from_releases == 'true' && inputs.rootfs_release_tag != '' }}
        working-directory: /builder
        run: |
          TAG="${{ inputs.rootfs_release_tag }}"
          echo "Downloading rootfs from release tag: ${TAG}"

          release_data=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")

          # Find and download rootfs tarball or .img.gz
          mkdir -p /builder/rootfs_dl
          echo "${release_data}" | jq -r '.assets[]?.name' | while read name; do
            url=$(echo "${release_data}" | jq -r --arg n "$name" '.assets[] | select(.name == $n) | .url')
            echo "Downloading: ${name}"
            curl -fsSL \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/octet-stream" \
              "${url}" \
              -o "/builder/rootfs_dl/${name}"
          done

          ls -lh /builder/rootfs_dl/
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Extract rootfs image
        if: ${{ steps.rootfs_dl.outputs.status == 'success' }}
        working-directory: /builder/rootfs_dl
        run: |
          # Extract the downloaded image for use as base
          for f in *.img.gz; do
            [[ -f "$f" ]] && gzip -dkf "$f" && sync
          done
          for f in *.img.xz; do
            [[ -f "$f" ]] && xz -dk "$f" && sync
          done
          for f in *.tar.gz; do
            [[ -f "$f" ]] && tar -xzf "$f" && sync
          done
          ls -lh
          echo "rootfs_asset=$(ls *.img 2>/dev/null | head -n 1)" >> ${GITHUB_ENV}

      - name: Enable QEMU for cross-compilation
        if: ${{ inputs.rootfs_from_releases != 'true' }}
        run: |
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes 2>/dev/null || true

      # ============================================================
      # Build full OS from source (when rootfs is not pre-built)
      # ============================================================
      - name: Build CoreOS from source [ ${{ needs.setup.outputs.codename }} ]
        id: compile
        if: ${{ inputs.rootfs_from_releases != 'true' }}
        working-directory: /builder/build
        run: |
          config_board="${{ inputs.config_board }}"
          [[ -z "${config_board}" ]] && config_board="odroidn2"

          ./compile.sh RELEASE=${{ needs.setup.outputs.release }} BOARD=${config_board} BRANCH=current \
                       BUILD_MINIMAL=no BUILD_ONLY=default HOST=coreos \
                       BUILD_DESKTOP=no EXPERT=yes KERNEL_CONFIGURE=no \
                       COMPRESS_OUTPUTIMAGE="sha" SHARE_LOG=yes \
                       KERNEL_VERSION=${{ inputs.kernel_version }} \
                       TOOLCHAIN=${{ inputs.kernel_toolchain }}

          echo "status=success" >> ${GITHUB_OUTPUT}

      # ============================================================
      # Rebuild using pre-built rootfs (kernel swap only)
      # ============================================================
      - name: Rebuild CoreOS with pre-built rootfs [ ${{ needs.setup.outputs.codename }} ]
        id: rebuild
        if: ${{ steps.rootfs_dl.outputs.status == 'success' }}
        run: |
          echo "Rebuilding CoreOS using pre-built rootfs with custom kernel..."

          config_board="${{ inputs.config_board }}"
          [[ -z "${config_board}" ]] && config_board="amlogic"

          # Use the repo's own rebuild mechanism
          cd ${{ github.workspace }}

          make_args=()
          make_args+=(-b "${config_board}")
          make_args+=(-k "${{ inputs.kernel_version }}")
          make_args+=(-a "true")

          # If kernel was downloaded from releases, point to local files
          if [[ "${{ inputs.kernel_from_releases }}" == "true" ]]; then
            make_args+=(-r "local")
            export LOCAL_KERNEL_PATH="/builder/kernel_dl"
          fi

          COREOS_PATH="/builder/rootfs_dl/${{ env.rootfs_asset }}" \
          sudo ./rebuild "${make_args[@]}"

          echo "status=success" >> ${GITHUB_OUTPUT}

      # ============================================================
      # Collect all deb packages
      # ============================================================
      - name: Collect all deb packages
        id: collect
        run: |
          mkdir -p /builder/debs/coreos

          # Collect from build output
          if [[ -d "/builder/build/output/debs" ]]; then
            find "/builder/build/output/debs" -name "*.deb" -exec cp -v {} /builder/debs/coreos/ \;
          fi
          if [[ -d "/builder/build/output/images" ]]; then
            find "/builder/build/output/images" -name "*.deb" -exec cp -v {} /builder/debs/coreos/ \; 2>/dev/null || true
          fi

          # Collect kernel debs if downloaded from releases
          if [[ -d "/builder/kernel_dl" ]]; then
            find "/builder/kernel_dl" -name "*.deb" -exec cp -v {} /builder/debs/coreos/ \; 2>/dev/null || true
            find "/builder/kernel_dl" -name "*.tar.gz" -exec cp -v {} /builder/debs/coreos/ \; 2>/dev/null || true
          fi

          echo "Collected debs:"
          ls -lh /builder/debs/coreos/ 2>/dev/null || echo "No debs found"

          cd /builder/debs
          tar -czf coreos-all-debs.tar.gz coreos 2>/dev/null || true
          ls -lh /builder/debs/

          echo "build_tag=CoreOS_${{ needs.setup.outputs.codename }}_arm64_$(date +"%Y.%m")" >> ${GITHUB_ENV}
          echo "status=success" >> ${GITHUB_OUTPUT}

      # ============================================================
      # Upload artifacts
      # ============================================================
      - name: Upload CoreOS image to Release
        uses: ophub/upload-to-releases@main
        if: ${{ (steps.compile.outputs.status == 'success' || steps.rebuild.outputs.status == 'success') && !cancelled() }}
        with:
          tag: ${{ env.build_tag }}
          artifacts: |
            /builder/build/output/images/*
            /builder/rootfs_dl/*.img.gz
          allow_updates: true
          remove_artifacts: false
          replaces_artifacts: true
          make_latest: true
          gh_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload CoreOS deb packages to Release
        uses: ophub/upload-to-releases@main
        if: ${{ steps.collect.outputs.status == 'success' && !cancelled() }}
        with:
          tag: ${{ env.build_tag }}
          artifacts: /builder/debs/*
          allow_updates: true
          remove_artifacts: false
          replaces_artifacts: true
          make_latest: false
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ### CoreOS Image Information
            - Developer: leftymods
            - Default username: `root`
            - Default password: `1234`
            - Install command: `coreos-install`
            - Update command: `coreos-update`
            ### Included Debian Packages
            - linux-image-* — Kernel image and modules
            - linux-dtb-* — Device tree blobs
            - linux-headers-* — Kernel headers
            - linux-u-boot-* — U-Boot bootloader
            - coreos-bsp-cli-* — Board support package
            ### Applicable Platform
            - 🐧 `arm64`
