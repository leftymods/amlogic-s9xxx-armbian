#==========================================================================
# Build CoreOS BSP packages from this repository
# Author: leftymods
#==========================================================================

name: Build CoreOS BSP packages

on:
  repository_dispatch:
  workflow_dispatch:

env:
  TZ: Etc/UTC

jobs:
  build-bsp:
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Package BSP files
        id: pack
        run: |
          cd build-coreos
          tar -czf coreos-bsp-files.tar.gz coreos-files/
          mkdir -p /builder/output
          cp coreos-bsp-files.tar.gz /builder/output/
          ls -lh /builder/output/

          echo "build_tag=CoreOS_BSP_arm64_$(date +"%Y.%m")" >> ${GITHUB_ENV}
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Upload BSP packages to Release
        uses: ophub/upload-to-releases@main
        if: ${{ steps.pack.outputs.status == 'success' && !cancelled() }}
        with:
          tag: ${{ env.build_tag }}
          artifacts: /builder/output/*
          allow_updates: true
          remove_artifacts: false
          replaces_artifacts: true
          make_latest: false
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ### CoreOS BSP Packages
            - Developer: leftymods
            - coreos-bsp-files.tar.gz — Board support files (scripts, configs, boot files)
            ### Applicable Platform
            - 🐧 `arm64`
