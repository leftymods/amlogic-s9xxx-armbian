#==========================================================================
# Description: Build CoreOS deb packages (kernel, u-boot, BSP) only
# Author: leftymods
#==========================================================================

name: Build CoreOS deb packages

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      set_release:
        description: "Select CoreOS Release"
        required: false
        default: "trixie"
        type: choice
        options:
          - trixie
          - bookworm
          - resolute
          - noble
      config_board:
        description: "Set the base board name"
        required: false
        default: "odroidn2"
      kernel_version:
        description: "Kernel version"
        required: false
        default: "6.12.y"
        type: choice
        options:
          - 6.1.y
          - 6.6.y
          - 6.12.y
          - 6.18.y
      kernel_toolchain:
        description: "Kernel toolchain"
        required: false
        default: "gcc"
        type: choice
        options:
          - gcc
          - clang

env:
  TZ: Etc/UTC

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      release: ${{ steps.codename.outputs.release }}
      codename: ${{ steps.codename.outputs.codename }}
    steps:
      - name: Map release to codename
        id: codename
        run: |
          RELEASE="${{ inputs.set_release }}"
          case "${RELEASE}" in
            trixie)   CODENAME="Nebula" ;;
            bookworm) CODENAME="Bookworm" ;;
            resolute) CODENAME="Resolute" ;;
            noble)    CODENAME="Noble" ;;
            *)        CODENAME="${RELEASE}" ;;
          esac
          echo "codename=${CODENAME}" >> "${GITHUB_OUTPUT}"
          echo "release=${RELEASE}" >> "${GITHUB_OUTPUT}"

  build-debs:
    needs: setup
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}

    name: coreos-debs-${{ needs.setup.outputs.codename }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize build environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-build-armbian-depends)
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo -E timedatectl set-timezone "${TZ:-Etc/UTC}"
          sudo -E ntpdate ntp.ubuntu.com 0.pool.ntp.org || true
          sudo -E timedatectl set-ntp true
          date -u
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create virtual disk for extended storage
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder
          df -Th
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Clone build system
        id: clone
        working-directory: /builder
        run: |
          git clone -q --single-branch --depth=1 --branch=main https://github.com/armbian/build.git build
          ln -sf /builder/build ${{ github.workspace }}/build
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Patch branding to CoreOS
        working-directory: /builder/build
        run: |
          grep -rl "Armbian" lib/ config/ extensions/ tools/ --include="*.sh" --include="*.conf" --include="*.config" \
            --include="*.json" --include="*.php" 2>/dev/null | while read f; do
            sed -i 's/Armbian/CoreOS/g; s/armbian/coreos/g; s/ARMBIAN/COREOS/g' "$f" 2>/dev/null || true
          done
          grep -rl "armbian" config/ --include="*.conf" --include="*.sh" 2>/dev/null | while read f; do
            sed -i 's/armbian/coreos/g; s/Armbian/CoreOS/g' "$f" 2>/dev/null || true
          done
          find . -name "control" -path "*/DEBIAN/*" | while read f; do
            sed -i 's/Maintainer:.*/Maintainer: leftymods <ggalab33@gmail.com>/' "$f" 2>/dev/null || true
          done
          find . -name "*.sh" | while read f; do
            sed -i 's/armbian-/coreos-/g' "$f" 2>/dev/null || true
          done
          find . -name "control" | while read f; do
            sed -i 's/Package: armbian-/Package: coreos-/g' "$f" 2>/dev/null || true
          done
          echo "Branding patched to CoreOS by leftymods"

      - name: Enable QEMU for cross-compilation
        run: |
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes 2>/dev/null || true

      - name: Build CoreOS deb packages [ ${{ needs.setup.outputs.codename }} ]
        id: compile
        working-directory: /builder/build
        run: |
          config_board="${{ inputs.config_board }}"
          [[ -z "${config_board}" ]] && config_board="odroidn2"

          ./compile.sh RELEASE=${{ needs.setup.outputs.release }} BOARD=${config_board} BRANCH=current \
                       BUILD_MINIMAL=no BUILD_ONLY=debs HOST=coreos \
                       BUILD_DESKTOP=no EXPERT=yes KERNEL_CONFIGURE=no \
                       COMPRESS_OUTPUTIMAGE="sha" SHARE_LOG=yes \
                       KERNEL_VERSION=${{ inputs.kernel_version }} \
                       TOOLCHAIN=${{ inputs.kernel_toolchain }}

          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Collect deb packages
        id: collect
        run: |
          mkdir -p /builder/debs/coreos

          if [[ -d "/builder/build/output/debs" ]]; then
            find "/builder/build/output/debs" -name "*.deb" -exec cp -v {} /builder/debs/coreos/ \;
          fi

          echo "Collected debs:"
          ls -lh /builder/debs/coreos/ 2>/dev/null || echo "No debs found"

          cd /builder/debs
          tar -czf coreos-all-debs.tar.gz coreos 2>/dev/null || true
          ls -lh /builder/debs/

          echo "build_tag=CoreOS_${{ needs.setup.outputs.codename }}_arm64_debs_$(date +"%Y.%m")" >> ${GITHUB_ENV}
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Upload CoreOS deb packages to Release
        uses: ophub/upload-to-releases@main
        if: ${{ steps.collect.outputs.status == 'success' && !cancelled() }}
        with:
          tag: ${{ env.build_tag }}
          artifacts: /builder/debs/*
          allow_updates: true
          remove_artifacts: false
          replaces_artifacts: true
          make_latest: false
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ### CoreOS Deb Packages
            - Developer: leftymods
            - linux-image-* — Kernel image and modules
            - linux-dtb-* — Device tree blobs
            - linux-headers-* — Kernel headers
            - linux-u-boot-* — U-Boot bootloader
            - coreos-bsp-cli-* — Board support package
            ### Applicable Platform
            - 🐧 `arm64`
